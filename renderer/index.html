<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Devine le Nombre</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #ffffff;
        color: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        background: #f5f5f5;
        border-radius: 16px;
        padding: 40px 32px;
        width: 400px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h1 {
        font-size: 1.6rem;
        margin-bottom: 6px;
        color: #e94560;
      }

      .subtitle {
        font-size: 0.85rem;
        color: #888;
        margin-bottom: 28px;
      }

      .input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }

      input[type="number"] {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid #ddd;
        border-radius: 10px;
        background: #fff;
        color: #222;
        font-size: 1.1rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="number"]:focus {
        border-color: #e94560;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      button {
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      button:active {
        transform: scale(0.96);
      }

      #btnDeviner {
        background: #e94560;
        color: #fff;
      }

      #btnDeviner:hover {
        background: #d63851;
      }

      #btnNouvelle {
        background: #333;
        color: #fff;
        width: 100%;
        margin-bottom: 20px;
      }

      #btnNouvelle:hover {
        background: #555;
      }

      #message {
        font-size: 1.1rem;
        font-weight: 600;
        min-height: 30px;
        margin-bottom: 12px;
        transition: color 0.2s;
      }

      #message.trop {
        color: #e94560;
      }

      #message.gagne {
        color: #2ecc71;
      }

      .compteur {
        font-size: 0.85rem;
        color: #888;
        margin-bottom: 18px;
      }

      .compteur span {
        color: #e94560;
        font-weight: bold;
      }

      h2 {
        font-size: 0.95rem;
        color: #999;
        margin-bottom: 10px;
        text-align: left;
      }

      #historique {
        max-height: 180px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .tentative {
        display: flex;
        justify-content: space-between;
        padding: 8px 14px;
        border-radius: 8px;
        background: #ffffff;
        font-size: 0.9rem;
        border: 1px solid #e6b906;
      }

      .tentative .numero {
        color: #aaa;
      }

      .tentative .valeur {
        font-weight: 600;
      }

      .tentative .indice {
        font-size: 0.8rem;
      }

      .tentative .indice.haut {
        color: #e94560;
      }

      .tentative .indice.bas {
        color: #e67e22;
      }

      .tentative .indice.ok {
        color: #2ecc71;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1> Devine le Nombre</h1>
      <p class="subtitle">Trouve le nombre mystère entre 1 et 100</p>

      <div class="input-row">
        <input
          type="number"
          id="inputNombre"
          min="1"
          max="100"
          placeholder="Ton nombre…"
          autofocus
        />
        <button id="btnDeviner">Deviner</button>
      </div>

      <button id="btnNouvelle">Nouvelle partie</button>

      <p id="message"></p>
      <p class="compteur">Essais : <span id="compteurEssais">0</span></p>

      <h2>Historique</h2>
      <div id="historique"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
